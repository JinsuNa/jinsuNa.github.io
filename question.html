<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
        <!-- 브라우저마다 다른 css 표현방식 통일하기 -->
    <!-- 구글에 reset .css cdn으로 검색 -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/reset-css@5.0.2/reset.min.css"
    />
    <!-- web font 사용하기 : pretendard github -->
    <!-- font-family 이름은 "Pretendard Variable" -->
    <link
      rel="stylesheet"
      as="style"
      crossorigin
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css"
    />
    <!-- 사용자 css -->
    <link rel="stylesheet" href="css/common.css" />
</head>
<body>
    <div class="progress">
        <div class="value">프로그레스바 영역</div>
    </div>
    <div class="question-box">
        <div class="number">02</div>
        <div class="question">해외 출장이 잡혔다!</div>
        <div class="btn btn-grey btn-small">짐 다</div>
        <div class="btn btn-grey btn-small">다 챙겼겠지?</div>
    </div>
</body>
</html>
